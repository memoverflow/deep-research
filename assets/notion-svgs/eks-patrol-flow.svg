<svg viewBox="0 0 850 400" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:850px;margin:24px auto;display:block;font-family:system-ui,-apple-system,sans-serif;">
  <defs><marker id="b1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#6e8eff"/></marker></defs>
  <rect width="850" height="400" fill="#020617" rx="12"/>
  <text x="425" y="25" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="bold">巡检执行流程 — 从触发到报告</text>

  <!-- Phase boxes -->
  <rect x="30" y="50" width="130" height="320" rx="8" fill="rgba(8,51,68,0.1)" stroke="#22d3ee" stroke-width="1"/>
  <text x="95" y="70" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="bold">触发</text>

  <rect x="180" y="50" width="130" height="320" rx="8" fill="rgba(6,78,59,0.1)" stroke="#34d399" stroke-width="1"/>
  <text x="245" y="70" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">Agent 接收</text>

  <rect x="330" y="50" width="200" height="320" rx="8" fill="rgba(120,53,15,0.08)" stroke="#fbbf24" stroke-width="1"/>
  <text x="430" y="70" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">数据采集（5个通道并行）</text>

  <rect x="550" y="50" width="130" height="320" rx="8" fill="rgba(6,78,59,0.1)" stroke="#34d399" stroke-width="1"/>
  <text x="615" y="70" text-anchor="middle" fill="#34d399" font-size="9" font-weight="bold">LLM 分析</text>

  <rect x="700" y="50" width="130" height="320" rx="8" fill="rgba(76,29,149,0.1)" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="70" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="bold">输出</text>

  <!-- Trigger column -->
  <rect x="45" y="90" width="100" height="30" rx="4" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="95" y="109" text-anchor="middle" fill="#67e8f9" font-size="8">每日 9:00 cron</text>
  <rect x="45" y="135" width="100" height="30" rx="4" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="95" y="154" text-anchor="middle" fill="#67e8f9" font-size="8">Alarm 触发</text>
  <rect x="45" y="180" width="100" height="30" rx="4" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="95" y="199" text-anchor="middle" fill="#67e8f9" font-size="8">手动 On-demand</text>

  <!-- Agent column -->
  <rect x="195" y="90" width="100" height="45" rx="4" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="245" y="108" text-anchor="middle" fill="#e2e8f0" font-size="8">加载 Patrol Skill</text>
  <text x="245" y="122" text-anchor="middle" fill="#6ee7b7" font-size="7">确定巡检范围</text>
  <text x="245" y="132" text-anchor="middle" fill="#6ee7b7" font-size="7">和检查项清单</text>

  <rect x="195" y="150" width="100" height="35" rx="4" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="245" y="168" text-anchor="middle" fill="#e2e8f0" font-size="8">加载 Topology</text>
  <text x="245" y="180" text-anchor="middle" fill="#6ee7b7" font-size="7">识别所有服务</text>

  <!-- Data collection column (5 parallel channels) -->
  <rect x="345" y="85" width="170" height="30" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="430" y="104" text-anchor="middle" fill="#fde68a" font-size="8">① K8s API → Pod/Deploy/Node 状态</text>

  <rect x="345" y="125" width="170" height="30" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="430" y="144" text-anchor="middle" fill="#fde68a" font-size="8">② Container Insights → CPU/Mem/Net</text>

  <rect x="345" y="165" width="170" height="30" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="430" y="184" text-anchor="middle" fill="#fde68a" font-size="8">③ Grafana/Prometheus → 应用指标</text>

  <rect x="345" y="205" width="170" height="30" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="430" y="224" text-anchor="middle" fill="#fde68a" font-size="8">④ CloudWatch Logs → 错误日志模式</text>

  <rect x="345" y="245" width="170" height="30" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.8"/>
  <text x="430" y="264" text-anchor="middle" fill="#fde68a" font-size="8">⑤ X-Ray → Trace 延迟 / 依赖链</text>

  <!-- LLM analysis column -->
  <rect x="565" y="90" width="100" height="40" rx="4" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="615" y="108" text-anchor="middle" fill="#e2e8f0" font-size="8">关联分析</text>
  <text x="615" y="122" text-anchor="middle" fill="#6ee7b7" font-size="7">跨信号 correlation</text>

  <rect x="565" y="145" width="100" height="40" rx="4" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="615" y="163" text-anchor="middle" fill="#e2e8f0" font-size="8">基线对比</text>
  <text x="615" y="177" text-anchor="middle" fill="#6ee7b7" font-size="7">vs 7天历史数据</text>

  <rect x="565" y="200" width="100" height="40" rx="4" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="615" y="218" text-anchor="middle" fill="#e2e8f0" font-size="8">严重性评估</text>
  <text x="615" y="232" text-anchor="middle" fill="#6ee7b7" font-size="7">P1 / P2 / P3 分级</text>

  <rect x="565" y="255" width="100" height="40" rx="4" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="615" y="273" text-anchor="middle" fill="#e2e8f0" font-size="8">建议生成</text>
  <text x="615" y="287" text-anchor="middle" fill="#6ee7b7" font-size="7">修复动作 + 优先级</text>

  <!-- Output column -->
  <rect x="715" y="90" width="100" height="35" rx="4" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="112" text-anchor="middle" fill="#c4b5fd" font-size="8">巡检报告</text>

  <rect x="715" y="135" width="100" height="35" rx="4" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="157" text-anchor="middle" fill="#c4b5fd" font-size="8">健康评分 0-100</text>

  <rect x="715" y="180" width="100" height="35" rx="4" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="202" text-anchor="middle" fill="#c4b5fd" font-size="8">→ Slack 通知</text>

  <rect x="715" y="225" width="100" height="35" rx="4" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="247" text-anchor="middle" fill="#c4b5fd" font-size="8">→ Notion 存档</text>

  <rect x="715" y="270" width="100" height="35" rx="4" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="765" y="292" text-anchor="middle" fill="#c4b5fd" font-size="8">→ PagerDuty (P1)</text>

  <!-- Flow arrows -->
  <line x1="145" y1="105" x2="193" y2="105" stroke="#6e8eff" stroke-width="1.2" marker-end="url(#b1)"/>
  <line x1="295" y1="110" x2="343" y2="100" stroke="#6e8eff" stroke-width="1.2" marker-end="url(#b1)"/>
  <line x1="295" y1="167" x2="343" y2="180" stroke="#6e8eff" stroke-width="1.2" marker-end="url(#b1)"/>
  <line x1="515" y1="160" x2="563" y2="160" stroke="#6e8eff" stroke-width="1.2" marker-end="url(#b1)"/>
  <line x1="665" y1="160" x2="713" y2="160" stroke="#6e8eff" stroke-width="1.2" marker-end="url(#b1)"/>

  <!-- Timeline at bottom -->
  <line x1="50" y1="360" x2="820" y2="360" stroke="#3a3a4a" stroke-width="1"/>
  <circle cx="95" cy="360" r="4" fill="#22d3ee"/>
  <text x="95" y="380" text-anchor="middle" fill="#64748b" font-size="7">T+0s 触发</text>
  <circle cx="245" cy="360" r="4" fill="#34d399"/>
  <text x="245" y="380" text-anchor="middle" fill="#64748b" font-size="7">T+2s 加载 Skill</text>
  <circle cx="430" cy="360" r="4" fill="#fbbf24"/>
  <text x="430" y="380" text-anchor="middle" fill="#64748b" font-size="7">T+5-60s 数据采集</text>
  <circle cx="615" cy="360" r="4" fill="#34d399"/>
  <text x="615" y="380" text-anchor="middle" fill="#64748b" font-size="7">T+60-90s 分析</text>
  <circle cx="765" cy="360" r="4" fill="#a78bfa"/>
  <text x="765" y="380" text-anchor="middle" fill="#64748b" font-size="7">T+90-120s 输出</text>
</svg>