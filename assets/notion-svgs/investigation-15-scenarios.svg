<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="Inter, -apple-system, sans-serif">
  <rect width="1200" height="800" fill="#0f172a"/>
  <text x="600" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">DevOps Agent 安全调查能力全景：15 类场景 × 4 个维度</text>
  
  <!-- Dimension headers -->
  <rect x="30" y="60" width="280" height="35" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="170" y="82" text-anchor="middle" fill="#fb7185" font-size="12" font-weight="600">身份与访问 (4 场景)</text>
  
  <rect x="325" y="60" width="280" height="35" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="465" y="82" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">运行时威胁 (5 场景)</text>
  
  <rect x="620" y="60" width="280" height="35" rx="6" fill="rgba(30,64,175,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="760" y="82" text-anchor="middle" fill="#60a5fa" font-size="12" font-weight="600">网络与数据 (3 场景)</text>
  
  <rect x="915" y="60" width="265" height="35" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="1047" y="82" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">合规与审计 (3 场景)</text>
  
  <!-- Column 1: Identity & Access -->
  <rect x="30" y="105" width="280" height="80" rx="6" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="0.5"/>
  <text x="45" y="125" fill="#fb7185" font-size="11" font-weight="600">1. SSH 暴力破解</text>
  <text x="45" y="143" fill="#94a3b8" font-size="9">触发：Failed password > 10/5min</text>
  <text x="45" y="158" fill="#94a3b8" font-size="9">调查：源IP分析、是否成功登录、GeoIP</text>
  <text x="45" y="173" fill="#94a3b8" font-size="9">响应：NACL封禁、SG收紧、fail2ban</text>
  
  <rect x="30" y="195" width="280" height="80" rx="6" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="0.5"/>
  <text x="45" y="215" fill="#fb7185" font-size="11" font-weight="600">2. 提权行为（Privilege Escalation）</text>
  <text x="45" y="233" fill="#94a3b8" font-size="9">触发：sudo 失败、SUID 变更、Capabilities</text>
  <text x="45" y="248" fill="#94a3b8" font-size="9">调查：谁在提权、目标命令、是否成功</text>
  <text x="45" y="263" fill="#94a3b8" font-size="9">响应：限制sudo、审查sudoers、隔离</text>
  
  <rect x="30" y="285" width="280" height="80" rx="6" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="0.5"/>
  <text x="45" y="305" fill="#fb7185" font-size="11" font-weight="600">3. 后门账户 / 持久化</text>
  <text x="45" y="323" fill="#94a3b8" font-size="9">触发：useradd、SSH key写入、cron新增</text>
  <text x="45" y="338" fill="#94a3b8" font-size="9">调查：创建者身份、账户权限、时间线</text>
  <text x="45" y="353" fill="#94a3b8" font-size="9">响应：删除账户、撤销key、审查crontab</text>
  
  <rect x="30" y="375" width="280" height="80" rx="6" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="0.5"/>
  <text x="45" y="395" fill="#fb7185" font-size="11" font-weight="600">4. IAM 异常行为</text>
  <text x="45" y="413" fill="#94a3b8" font-size="9">触发：GuardDuty IAM finding、异常API调用</text>
  <text x="45" y="428" fill="#94a3b8" font-size="9">调查：谁的凭证、从哪里、做了什么</text>
  <text x="45" y="443" fill="#94a3b8" font-size="9">响应：禁用密钥、强制MFA、权限收紧</text>
  
  <!-- Column 2: Runtime Threats -->
  <rect x="325" y="105" width="280" height="80" rx="6" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="340" y="125" fill="#fbbf24" font-size="11" font-weight="600">5. 加密货币挖矿</text>
  <text x="340" y="143" fill="#94a3b8" font-size="9">触发：CPU 持续 >90%、OOM Kill、矿池DNS</text>
  <text x="340" y="158" fill="#94a3b8" font-size="9">调查：进程名、C2连接、入侵路径</text>
  <text x="340" y="173" fill="#94a3b8" font-size="9">响应：Kill进程、隔离、重建实例</text>
  
  <rect x="325" y="195" width="280" height="80" rx="6" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="340" y="215" fill="#fbbf24" font-size="11" font-weight="600">6. 恶意进程 / 反弹Shell</text>
  <text x="340" y="233" fill="#94a3b8" font-size="9">触发：/tmp执行、nc/ncat连接、base64解码</text>
  <text x="340" y="248" fill="#94a3b8" font-size="9">调查：父进程链、网络连接、文件hash</text>
  <text x="340" y="263" fill="#94a3b8" font-size="9">响应：隔离+快照取证、重建</text>
  
  <rect x="325" y="285" width="280" height="80" rx="6" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="340" y="305" fill="#fbbf24" font-size="11" font-weight="600">7. Rootkit / 内核模块注入</text>
  <text x="340" y="323" fill="#94a3b8" font-size="9">触发：insmod/modprobe、文件完整性变更</text>
  <text x="340" y="338" fill="#94a3b8" font-size="9">调查：模块名、加载时间、系统调用hook</text>
  <text x="340" y="353" fill="#94a3b8" font-size="9">响应：立即隔离、离线取证、重建</text>
  
  <rect x="325" y="375" width="280" height="80" rx="6" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="340" y="395" fill="#fbbf24" font-size="11" font-weight="600">8. 容器逃逸 / ECS/EKS 运行时</text>
  <text x="340" y="413" fill="#94a3b8" font-size="9">触发：privileged container、hostPID mount</text>
  <text x="340" y="428" fill="#94a3b8" font-size="9">调查：Pod spec、节点影响、横向移动</text>
  <text x="340" y="443" fill="#94a3b8" font-size="9">响应：隔离Pod、Cordon节点、审查RBAC</text>
  
  <rect x="325" y="465" width="280" height="80" rx="6" fill="rgba(120,53,15,0.15)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="340" y="485" fill="#fbbf24" font-size="11" font-weight="600">9. 恶意 Cron / 定时任务持久化</text>
  <text x="340" y="503" fill="#94a3b8" font-size="9">触发：crontab 修改、systemd timer 新建</text>
  <text x="340" y="518" fill="#94a3b8" font-size="9">调查：任务内容、执行频率、目标URL</text>
  <text x="340" y="533" fill="#94a3b8" font-size="9">响应：删除任务、检查下载物、审查其他持久化</text>
  
  <!-- Column 3: Network & Data -->
  <rect x="620" y="105" width="280" height="80" rx="6" fill="rgba(30,64,175,0.15)" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="635" y="125" fill="#60a5fa" font-size="11" font-weight="600">10. C2 通信 / 异常出站流量</text>
  <text x="635" y="143" fill="#94a3b8" font-size="9">触发：Tor/暗网连接、异常DNS、流量激增</text>
  <text x="635" y="158" fill="#94a3b8" font-size="9">调查：目标域名/IP、流量量级、VPC Flow</text>
  <text x="635" y="173" fill="#94a3b8" font-size="9">响应：Network Firewall阻断、NACL封禁</text>
  
  <rect x="620" y="195" width="280" height="80" rx="6" fill="rgba(30,64,175,0.15)" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="635" y="215" fill="#60a5fa" font-size="11" font-weight="600">11. 数据泄露 / S3 异常访问</text>
  <text x="635" y="233" fill="#94a3b8" font-size="9">触发：大量S3 GetObject、异常IP下载、Macie告警</text>
  <text x="635" y="248" fill="#94a3b8" font-size="9">调查：访问者身份、数据量、目标bucket</text>
  <text x="635" y="263" fill="#94a3b8" font-size="9">响应：Bucket Policy收紧、IP封禁、通知DPO</text>
  
  <rect x="620" y="285" width="280" height="80" rx="6" fill="rgba(30,64,175,0.15)" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="635" y="305" fill="#60a5fa" font-size="11" font-weight="600">12. 端口扫描 / 横向移动</text>
  <text x="635" y="323" fill="#94a3b8" font-size="9">触发：GuardDuty Recon、VPC Flow异常连接</text>
  <text x="635" y="338" fill="#94a3b8" font-size="9">调查：扫描源、目标范围、已建立连接</text>
  <text x="635" y="353" fill="#94a3b8" font-size="9">响应：隔离源实例、SG审查、检查其他实例</text>
  
  <!-- Column 4: Compliance & Audit -->
  <rect x="915" y="105" width="265" height="80" rx="6" fill="rgba(6,78,59,0.15)" stroke="#34d399" stroke-width="0.5"/>
  <text x="930" y="125" fill="#34d399" font-size="11" font-weight="600">13. Security Group 变更审计</text>
  <text x="930" y="143" fill="#94a3b8" font-size="9">触发：0.0.0.0/0入站规则添加</text>
  <text x="930" y="158" fill="#94a3b8" font-size="9">调查：谁改的、什么时间、影响范围</text>
  <text x="930" y="173" fill="#94a3b8" font-size="9">响应：自动回滚、通知Owner</text>
  
  <rect x="915" y="195" width="265" height="80" rx="6" fill="rgba(6,78,59,0.15)" stroke="#34d399" stroke-width="0.5"/>
  <text x="930" y="215" fill="#34d399" font-size="11" font-weight="600">14. IAM Policy 变更审计</text>
  <text x="930" y="233" fill="#94a3b8" font-size="9">触发：Policy创建/修改、权限扩大</text>
  <text x="930" y="248" fill="#94a3b8" font-size="9">调查：变更内容diff、操作者、是否有审批</text>
  <text x="930" y="263" fill="#94a3b8" font-size="9">响应：Access Analyzer检查、回滚未审批变更</text>
  
  <rect x="915" y="285" width="265" height="80" rx="6" fill="rgba(6,78,59,0.15)" stroke="#34d399" stroke-width="0.5"/>
  <text x="930" y="305" fill="#34d399" font-size="11" font-weight="600">15. CIS Benchmark 违规</text>
  <text x="930" y="323" fill="#94a3b8" font-size="9">触发：Config Rule non-compliant</text>
  <text x="930" y="338" fill="#94a3b8" font-size="9">调查：哪些资源违规、影响评估</text>
  <text x="930" y="353" fill="#94a3b8" font-size="9">响应：自动修复（SSM Remediation）</text>
  
  <!-- Bottom: Data Sources -->
  <rect x="30" y="580" width="1140" height="90" rx="8" fill="rgba(30,41,59,0.4)" stroke="#475569" stroke-width="1"/>
  <text x="600" y="605" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Agent 可自动查询的数据源</text>
  <rect x="50" y="620" width="140" height="35" rx="4" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="0.5"/>
  <text x="120" y="642" text-anchor="middle" fill="#fbbf24" font-size="10">CloudWatch Logs</text>
  <rect x="205" y="620" width="140" height="35" rx="4" fill="rgba(136,19,55,0.3)" stroke="#fb7185" stroke-width="0.5"/>
  <text x="275" y="642" text-anchor="middle" fill="#fb7185" font-size="10">GuardDuty</text>
  <rect x="360" y="620" width="140" height="35" rx="4" fill="rgba(30,64,175,0.3)" stroke="#60a5fa" stroke-width="0.5"/>
  <text x="430" y="642" text-anchor="middle" fill="#60a5fa" font-size="10">CloudTrail</text>
  <rect x="515" y="620" width="140" height="35" rx="4" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="0.5"/>
  <text x="585" y="642" text-anchor="middle" fill="#34d399" font-size="10">VPC Flow Logs</text>
  <rect x="670" y="620" width="140" height="35" rx="4" fill="rgba(76,29,149,0.3)" stroke="#a78bfa" stroke-width="0.5"/>
  <text x="740" y="642" text-anchor="middle" fill="#a78bfa" font-size="10">Security Hub</text>
  <rect x="825" y="620" width="140" height="35" rx="4" fill="rgba(30,41,59,0.5)" stroke="#64748b" stroke-width="0.5"/>
  <text x="895" y="642" text-anchor="middle" fill="#e2e8f0" font-size="10">Config Rules</text>
  <rect x="980" y="620" width="175" height="35" rx="4" fill="rgba(30,41,59,0.5)" stroke="#64748b" stroke-width="0.5"/>
  <text x="1067" y="642" text-anchor="middle" fill="#e2e8f0" font-size="10">Grafana / MCP Tools</text>
  
  <!-- Bottom legend -->
  <text x="600" y="700" text-anchor="middle" fill="#64748b" font-size="10">每个场景都可以通过 Investigation（一次性调查）或 Custom Skill（可复用 Runbook）实现</text>
  <text x="600" y="720" text-anchor="middle" fill="#64748b" font-size="10">区别：Investigation = 给 Agent 一段自然语言指令 | Custom Skill = 结构化的标准操作步骤（团队共享）</text>
</svg>