  <circle cx="500" cy="80" r="28" fill="#1e1e2a" stroke="#fbbf24" stroke-width="2"/><text x="500" y="78" text-anchor="middle" fill="#fbbf24" font-size="8">E3</text><text x="500" y="90" text-anchor="middle" fill="#fbbf24" font-size="7">30%</text>
