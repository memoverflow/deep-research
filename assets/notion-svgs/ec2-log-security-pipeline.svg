<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="700" fill="#0f172a"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="600">EC2 系统日志安全分析全链路架构</text>
  
  <!-- Layer 1: EC2 Instances -->
  <rect x="40" y="70" width="200" height="580" rx="12" fill="rgba(6,78,59,0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="140" y="95" text-anchor="middle" fill="#34d399" font-size="13" font-weight="600">EC2 Instances</text>
  
  <!-- EC2 boxes -->
  <rect x="60" y="110" width="160" height="60" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="140" y="135" text-anchor="middle" fill="#e2e8f0" font-size="11">/var/log/secure</text>
  <text x="140" y="155" text-anchor="middle" fill="#94a3b8" font-size="9">SSH login, sudo, PAM</text>
  
  <rect x="60" y="180" width="160" height="60" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="140" y="205" text-anchor="middle" fill="#e2e8f0" font-size="11">/var/log/auth.log</text>
  <text x="140" y="225" text-anchor="middle" fill="#94a3b8" font-size="9">Authentication events</text>
  
  <rect x="60" y="250" width="160" height="60" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="140" y="275" text-anchor="middle" fill="#e2e8f0" font-size="11">/var/log/syslog</text>
  <text x="140" y="295" text-anchor="middle" fill="#94a3b8" font-size="9">System events, kernel</text>
  
  <rect x="60" y="320" width="160" height="60" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="140" y="345" text-anchor="middle" fill="#e2e8f0" font-size="11">/var/log/audit/audit.log</text>
  <text x="140" y="365" text-anchor="middle" fill="#94a3b8" font-size="9">SELinux, syscalls</text>
  
  <rect x="60" y="390" width="160" height="60" rx="6" fill="rgba(6,78,59,0.5)" stroke="#34d399" stroke-width="1"/>
  <text x="140" y="415" text-anchor="middle" fill="#e2e8f0" font-size="11">/var/log/cron</text>
  <text x="140" y="435" text-anchor="middle" fill="#94a3b8" font-size="9">Scheduled tasks</text>

  <!-- CloudWatch Agent arrow -->
  <rect x="60" y="470" width="160" height="45" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="140" y="497" text-anchor="middle" fill="#fbbf24" font-size="11">CloudWatch Agent</text>
  
  <!-- Arrow to CloudWatch Logs -->
  <line x1="240" y1="350" x2="290" y2="350" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow)"/>
  <defs><marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#fbbf24"/></marker></defs>
  
  <!-- Layer 2: CloudWatch Logs -->
  <rect x="300" y="70" width="220" height="580" rx="12" fill="rgba(120,53,15,0.2)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="410" y="95" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="600">CloudWatch Logs</text>
  
  <rect x="320" y="115" width="180" height="50" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="410" y="138" text-anchor="middle" fill="#e2e8f0" font-size="11">Log Groups</text>
  <text x="410" y="153" text-anchor="middle" fill="#94a3b8" font-size="9">/ec2/security, /ec2/syslog</text>
  
  <rect x="320" y="180" width="180" height="50" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="410" y="203" text-anchor="middle" fill="#e2e8f0" font-size="11">Metric Filters</text>
  <text x="410" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">Pattern match → Custom Metrics</text>
  
  <rect x="320" y="245" width="180" height="50" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="410" y="268" text-anchor="middle" fill="#e2e8f0" font-size="11">Logs Insights</text>
  <text x="410" y="283" text-anchor="middle" fill="#94a3b8" font-size="9">SQL-like query engine</text>
  
  <rect x="320" y="310" width="180" height="50" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="410" y="333" text-anchor="middle" fill="#e2e8f0" font-size="11">CloudWatch Alarms</text>
  <text x="410" y="348" text-anchor="middle" fill="#94a3b8" font-size="9">Threshold → Alert trigger</text>
  
  <rect x="320" y="375" width="180" height="50" rx="6" fill="rgba(120,53,15,0.4)" stroke="#fbbf24" stroke-width="1"/>
  <text x="410" y="398" text-anchor="middle" fill="#e2e8f0" font-size="11">Subscription Filters</text>
  <text x="410" y="413" text-anchor="middle" fill="#94a3b8" font-size="9">Real-time stream to Lambda/ES</text>

  <!-- Layer 3: Detection & Response -->
  <rect x="550" y="70" width="220" height="580" rx="12" fill="rgba(136,19,55,0.2)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="660" y="95" text-anchor="middle" fill="#fb7185" font-size="13" font-weight="600">Detection & Response</text>
  
  <rect x="570" y="115" width="180" height="50" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="660" y="138" text-anchor="middle" fill="#e2e8f0" font-size="11">GuardDuty</text>
  <text x="660" y="153" text-anchor="middle" fill="#94a3b8" font-size="9">Runtime Monitoring + ML</text>
  
  <rect x="570" y="180" width="180" height="50" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="660" y="203" text-anchor="middle" fill="#e2e8f0" font-size="11">EventBridge</text>
  <text x="660" y="218" text-anchor="middle" fill="#94a3b8" font-size="9">Event routing + rules</text>
  
  <rect x="570" y="245" width="180" height="50" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="660" y="268" text-anchor="middle" fill="#e2e8f0" font-size="11">Lambda (Auto-Remediation)</text>
  <text x="660" y="283" text-anchor="middle" fill="#94a3b8" font-size="9">Isolate / Snapshot / Block IP</text>
  
  <rect x="570" y="310" width="180" height="50" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="660" y="333" text-anchor="middle" fill="#e2e8f0" font-size="11">SNS Notification</text>
  <text x="660" y="348" text-anchor="middle" fill="#94a3b8" font-size="9">Slack / PagerDuty / Email</text>
  
  <rect x="570" y="375" width="180" height="50" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1"/>
  <text x="660" y="398" text-anchor="middle" fill="#e2e8f0" font-size="11">Security Hub</text>
  <text x="660" y="413" text-anchor="middle" fill="#94a3b8" font-size="9">Centralized findings</text>

  <!-- Layer 4: DevOps Agent -->
  <rect x="800" y="70" width="360" height="580" rx="12" fill="rgba(30,64,175,0.2)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="980" y="95" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600">AWS DevOps Agent</text>
  
  <rect x="820" y="115" width="160" height="55" rx="6" fill="rgba(30,64,175,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="900" y="138" text-anchor="middle" fill="#e2e8f0" font-size="11">Investigation</text>
  <text x="900" y="155" text-anchor="middle" fill="#94a3b8" font-size="9">Auto RCA from alarm trigger</text>
  
  <rect x="1000" y="115" width="140" height="55" rx="6" fill="rgba(30,64,175,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="1070" y="138" text-anchor="middle" fill="#e2e8f0" font-size="11">Prevention</text>
  <text x="1070" y="155" text-anchor="middle" fill="#94a3b8" font-size="9">Proactive recommendations</text>
  
  <rect x="820" y="185" width="160" height="55" rx="6" fill="rgba(30,64,175,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="900" y="208" text-anchor="middle" fill="#e2e8f0" font-size="11">Custom Skills</text>
  <text x="900" y="225" text-anchor="middle" fill="#94a3b8" font-size="9">Security runbooks as skills</text>
  
  <rect x="1000" y="185" width="140" height="55" rx="6" fill="rgba(30,64,175,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="1070" y="208" text-anchor="middle" fill="#e2e8f0" font-size="11">Learned Skills</text>
  <text x="1070" y="225" text-anchor="middle" fill="#94a3b8" font-size="9">Auto-generated from env</text>
  
  <rect x="820" y="260" width="320" height="55" rx="6" fill="rgba(30,64,175,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="980" y="283" text-anchor="middle" fill="#e2e8f0" font-size="11">On-demand Query (Natural Language)</text>
  <text x="980" y="300" text-anchor="middle" fill="#94a3b8" font-size="9">"过去 1 小时有哪些 SSH 失败登录？来源 IP 是什么？"</text>
  
  <rect x="820" y="330" width="320" height="55" rx="6" fill="rgba(30,64,175,0.4)" stroke="#60a5fa" stroke-width="1"/>
  <text x="980" y="353" text-anchor="middle" fill="#e2e8f0" font-size="11">Agent Journal (Audit Trail)</text>
  <text x="980" y="370" text-anchor="middle" fill="#94a3b8" font-size="9">Immutable log of every reasoning step</text>
  
  <!-- Arrows between layers -->
  <line x1="520" y1="200" x2="555" y2="200" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="520" y1="330" x2="555" y2="330" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow2)"/>
  <line x1="750" y1="140" x2="815" y2="140" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="750" y1="270" x2="815" y2="270" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <defs>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#fbbf24"/></marker>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#fb7185"/></marker>
  </defs>
  
  <!-- Bottom: Threat types -->
  <rect x="40" y="560" width="1120" height="90" rx="8" fill="rgba(30,41,59,0.5)" stroke="#475569" stroke-width="1"/>
  <text x="600" y="585" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600">检测的威胁类型</text>
  <text x="140" y="615" text-anchor="middle" fill="#f87171" font-size="10">SSH 暴力破解</text>
  <text x="300" y="615" text-anchor="middle" fill="#f87171" font-size="10">提权行为</text>
  <text x="440" y="615" text-anchor="middle" fill="#f87171" font-size="10">异常进程</text>
  <text x="580" y="615" text-anchor="middle" fill="#f87171" font-size="10">Rootkit</text>
  <text x="700" y="615" text-anchor="middle" fill="#f87171" font-size="10">后门账户</text>
  <text x="840" y="615" text-anchor="middle" fill="#f87171" font-size="10">恶意 Cron</text>
  <text x="980" y="615" text-anchor="middle" fill="#f87171" font-size="10">OOM/资源耗尽</text>
  <text x="1100" y="615" text-anchor="middle" fill="#f87171" font-size="10">数据外泄</text>
  <text x="140" y="640" text-anchor="middle" fill="#94a3b8" font-size="9">auth.log</text>
  <text x="300" y="640" text-anchor="middle" fill="#94a3b8" font-size="9">secure + audit</text>
  <text x="440" y="640" text-anchor="middle" fill="#94a3b8" font-size="9">syslog + audit</text>
  <text x="580" y="640" text-anchor="middle" fill="#94a3b8" font-size="9">syslog + kern</text>
  <text x="700" y="640" text-anchor="middle" fill="#94a3b8" font-size="9">auth.log</text>
  <text x="840" y="640" text-anchor="middle" fill="#94a3b8" font-size="9">cron + syslog</text>
  <text x="980" y="640" text-anchor="middle" fill="#94a3b8" font-size="9">syslog + kern</text>
  <text x="1100" y="640" text-anchor="middle" fill="#94a3b8" font-size="9">VPC Flow Logs</text>
</svg>