<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:800px;margin:24px auto;display:block;font-family:system-ui,-apple-system,sans-serif;">
  <defs><marker id="arr4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0L10 5L0 10z" fill="#6e8eff"/></marker></defs>
  <rect width="800" height="350" fill="#020617" rx="12"/>
  <text x="400" y="28" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">网络安全隔离 — VPC 部署架构</text>

  <!-- VPC boundary -->
  <rect x="120" y="45" width="650" height="280" rx="12" fill="rgba(251,191,36,0.03)" stroke="#fbbf24" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="135" y="62" fill="#fbbf24" font-size="9">VPC 10.0.0.0/16 — Private Only</text>

  <!-- Public subnet (only ALB) -->
  <rect x="140" y="75" width="200" height="80" rx="8" fill="rgba(8,51,68,0.15)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="150" y="90" fill="#22d3ee" font-size="8">Public Subnet (仅 ALB)</text>
  <rect x="170" y="100" width="140" height="40" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="240" y="120" text-anchor="middle" fill="#e2e8f0" font-size="10">API Gateway / ALB</text>
  <text x="240" y="134" text-anchor="middle" fill="#22d3ee" font-size="8">HTTPS :443</text>

  <!-- Private subnet - Agent -->
  <rect x="140" y="170" width="200" height="80" rx="8" fill="rgba(6,78,59,0.15)" stroke="#34d399" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="150" y="185" fill="#34d399" font-size="8">Private Subnet A — Agent</text>
  <rect x="170" y="195" width="140" height="40" rx="6" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="240" y="215" text-anchor="middle" fill="#e2e8f0" font-size="10">AgentCore Runtime</text>
  <text x="240" y="229" text-anchor="middle" fill="#34d399" font-size="8">Security Agent</text>

  <!-- Private subnet - MobSF -->
  <rect x="400" y="170" width="200" height="80" rx="8" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="410" y="185" fill="#fb7185" font-size="8">Private Subnet B — 扫描引擎</text>
  <rect x="430" y="195" width="140" height="40" rx="6" fill="rgba(136,19,55,0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="500" y="215" text-anchor="middle" fill="#e2e8f0" font-size="10">MobSF (Fargate)</text>
  <text x="500" y="229" text-anchor="middle" fill="#fb7185" font-size="8">无公网出口 ⚠️</text>

  <!-- VPC Endpoints -->
  <rect x="400" y="75" width="200" height="80" rx="8" fill="rgba(76,29,149,0.15)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="410" y="90" fill="#a78bfa" font-size="8">VPC Endpoints (PrivateLink)</text>
  <rect x="415" y="100" width="70" height="28" rx="4" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="450" y="118" text-anchor="middle" fill="#c4b5fd" font-size="8">S3</text>
  <rect x="495" y="100" width="90" height="28" rx="4" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="540" y="118" text-anchor="middle" fill="#c4b5fd" font-size="8">Bedrock</text>

  <!-- Arrows -->
  <line x1="240" y1="140" x2="240" y2="193" stroke="#6e8eff" stroke-width="1.2" marker-end="url(#arr4)"/>
  <line x1="310" y1="215" x2="428" y2="215" stroke="#fb7185" stroke-width="1.2" marker-end="url(#arr4)"/>
  <text x="370" y="210" fill="#94a3b8" font-size="7">内网 :8000</text>
  <line x1="240" y1="195" x2="450" y2="130" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arr4)"/>

  <!-- Internet (outside) -->
  <rect x="30" y="95" width="80" height="40" rx="6" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="70" y="115" text-anchor="middle" fill="#94a3b8" font-size="9">Internet</text>
  <text x="70" y="129" text-anchor="middle" fill="#64748b" font-size="7">用户请求</text>
  <line x1="110" y1="115" x2="168" y2="115" stroke="#6e8eff" stroke-width="1.2" marker-end="url(#arr4)"/>

  <!-- X mark - no internet for MobSF -->
  <text x="500" y="260" text-anchor="middle" fill="#ef4444" font-size="10">✗ 无出站互联网</text>
  <text x="500" y="275" text-anchor="middle" fill="#64748b" font-size="8">恶意 APK 无法回连 C2</text>

  <!-- Security note -->
  <rect x="140" y="270" width="470" height="40" rx="6" fill="rgba(136,19,55,0.1)" stroke="#fb7185" stroke-width="1"/>
  <text x="375" y="288" text-anchor="middle" fill="#fda4af" font-size="9">安全设计：MobSF 容器零公网权限 | SG 只允许 Agent→MobSF :8000 | S3/Bedrock 走 PrivateLink</text>
  <text x="375" y="303" text-anchor="middle" fill="#94a3b8" font-size="8">即使上传的 APK 是恶意软件，容器内也无法建立外部网络连接</text>
</svg>