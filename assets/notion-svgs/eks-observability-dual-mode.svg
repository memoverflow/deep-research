<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-rose" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#fb7185"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#34d399"/>
    </marker>
  </defs>
  <rect width="1200" height="650" fill="#020617"/>
  <rect width="1200" height="650" fill="url(#grid)"/>
  
  <text x="600" y="35" text-anchor="middle" fill="#f8fafc" font-size="16" font-weight="700">Dual Mode: Reactive (Alert-Driven) + Proactive (Agent-Initiated)</text>

  <!-- LEFT: Reactive Mode -->
  <rect x="30" y="55" width="550" height="570" rx="10" fill="rgba(136, 19, 55, 0.08)" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="305" y="80" text-anchor="middle" fill="#fb7185" font-size="13" font-weight="700">REACTIVE MODE (Passive Response)</text>
  <text x="305" y="98" text-anchor="middle" fill="#94a3b8" font-size="9">Alert fires -&gt; Contact Point -&gt; Agent investigates</text>

  <!-- Reactive flow -->
  <rect x="60" y="115" width="200" height="50" rx="6" fill="#0f172a"/><rect x="60" y="115" width="200" height="50" rx="6" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="160" y="137" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">Prometheus / CloudWatch</text>
  <text x="160" y="153" text-anchor="middle" fill="#94a3b8" font-size="8">Metric exceeds threshold</text>

  <line x1="160" y1="165" x2="160" y2="185" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arr-rose)"/>

  <rect x="60" y="190" width="200" height="50" rx="6" fill="#0f172a"/><rect x="60" y="190" width="200" height="50" rx="6" fill="rgba(136, 19, 55, 0.3)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="160" y="212" text-anchor="middle" fill="#fb7185" font-size="10" font-weight="600">Alertmanager / CW Alarm</text>
  <text x="160" y="228" text-anchor="middle" fill="#94a3b8" font-size="8">Route + Group + Silence</text>

  <line x1="160" y1="240" x2="160" y2="260" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arr-rose)"/>

  <rect x="60" y="265" width="200" height="50" rx="6" fill="#0f172a"/><rect x="60" y="265" width="200" height="50" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="160" y="287" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Grafana Contact Points</text>
  <text x="160" y="303" text-anchor="middle" fill="#94a3b8" font-size="8">Slack / PagerDuty / Webhook</text>

  <!-- Contact point branches -->
  <line x1="160" y1="315" x2="90" y2="345" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="160" y1="315" x2="160" y2="345" stroke="#94a3b8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="160" y1="315" x2="230" y2="345" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arr-rose)"/>

  <rect x="50" y="350" width="85" height="40" rx="5" fill="#0f172a"/><rect x="50" y="350" width="85" height="40" rx="5" fill="rgba(30, 41, 59, 0.4)" stroke="#94a3b8" stroke-width="1"/>
  <text x="92" y="368" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600">Slack</text>
  <text x="92" y="382" text-anchor="middle" fill="#64748b" font-size="7">P3/P4</text>

  <rect x="140" y="350" width="85" height="40" rx="5" fill="#0f172a"/><rect x="140" y="350" width="85" height="40" rx="5" fill="rgba(30, 41, 59, 0.4)" stroke="#94a3b8" stroke-width="1"/>
  <text x="182" y="368" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600">PagerDuty</text>
  <text x="182" y="382" text-anchor="middle" fill="#64748b" font-size="7">P1/P2</text>

  <rect x="230" y="350" width="120" height="40" rx="5" fill="#0f172a"/><rect x="230" y="350" width="120" height="40" rx="5" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="290" y="368" text-anchor="middle" fill="#fb923c" font-size="8" font-weight="600">Webhook</text>
  <text x="290" y="382" text-anchor="middle" fill="#64748b" font-size="7">-&gt; DevOps Agent</text>

  <line x1="290" y1="390" x2="290" y2="420" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-rose)"/>

  <rect x="200" y="425" width="200" height="60" rx="6" fill="#0f172a"/><rect x="200" y="425" width="200" height="60" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="2"/>
  <text x="300" y="450" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="700">DevOps Agent</text>
  <text x="300" y="467" text-anchor="middle" fill="#94a3b8" font-size="8">Auto RCA + Correlate</text>
  <text x="300" y="480" text-anchor="middle" fill="#94a3b8" font-size="8">Metrics + Logs + Traces + Changes</text>

  <line x1="300" y1="485" x2="300" y2="515" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr-rose)"/>

  <rect x="200" y="520" width="200" height="50" rx="6" fill="#0f172a"/><rect x="200" y="520" width="200" height="50" rx="6" fill="rgba(6, 78, 59, 0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="300" y="542" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">Structured Report</text>
  <text x="300" y="558" text-anchor="middle" fill="#94a3b8" font-size="8">Root Cause + Impact + Fix Plan</text>

  <!-- Severity table -->
  <rect x="370" y="115" width="190" height="195" rx="6" fill="rgba(30, 41, 59, 0.4)" stroke="#475569" stroke-width="1"/>
  <text x="465" y="135" text-anchor="middle" fill="#f8fafc" font-size="9" font-weight="600">Alert Severity Routing</text>
  <text x="385" y="158" fill="#fb7185" font-size="8" font-weight="600">P1 Critical</text>
  <text x="385" y="172" fill="#94a3b8" font-size="7">Burn Rate &gt; 14.4x</text>
  <text x="385" y="186" fill="#94a3b8" font-size="7">PD + Agent + Phone</text>
  <line x1="380" y1="192" x2="550" y2="192" stroke="#334155" stroke-width="0.5"/>
  <text x="385" y="208" fill="#fbbf24" font-size="8" font-weight="600">P2 High</text>
  <text x="385" y="222" fill="#94a3b8" font-size="7">Burn Rate &gt; 6x</text>
  <text x="385" y="236" fill="#94a3b8" font-size="7">Slack + Agent</text>
  <line x1="380" y1="242" x2="550" y2="242" stroke="#334155" stroke-width="0.5"/>
  <text x="385" y="258" fill="#34d399" font-size="8" font-weight="600">P3 Medium</text>
  <text x="385" y="272" fill="#94a3b8" font-size="7">Error &gt; 5% for 5min</text>
  <text x="385" y="286" fill="#94a3b8" font-size="7">Slack + Runbook</text>
  <line x1="380" y1="292" x2="550" y2="292" stroke="#334155" stroke-width="0.5"/>
  <text x="385" y="300" fill="#94a3b8" font-size="8" font-weight="600">P4 Low</text>

  <!-- RIGHT: Proactive Mode -->
  <rect x="620" y="55" width="550" height="570" rx="10" fill="rgba(6, 78, 59, 0.08)" stroke="#34d399" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="895" y="80" text-anchor="middle" fill="#34d399" font-size="13" font-weight="700">PROACTIVE MODE (Agent-Initiated)</text>
  <text x="895" y="98" text-anchor="middle" fill="#94a3b8" font-size="9">Scheduled patrol + ML anomaly -&gt; Agent preempts</text>

  <!-- Proactive triggers -->
  <rect x="650" y="115" width="200" height="50" rx="6" fill="#0f172a"/><rect x="650" y="115" width="200" height="50" rx="6" fill="rgba(6, 78, 59, 0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="750" y="137" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">Scheduled Cron</text>
  <text x="750" y="153" text-anchor="middle" fill="#94a3b8" font-size="8">Daily/Weekly/Pre-deploy</text>

  <rect x="870" y="115" width="200" height="50" rx="6" fill="#0f172a"/><rect x="870" y="115" width="200" height="50" rx="6" fill="rgba(8, 51, 68, 0.3)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="970" y="137" text-anchor="middle" fill="#22d3ee" font-size="10" font-weight="600">ML Anomaly Detection</text>
  <text x="970" y="153" text-anchor="middle" fill="#94a3b8" font-size="8">CloudWatch / Lookout</text>

  <line x1="750" y1="165" x2="860" y2="195" stroke="#34d399" stroke-width="1" marker-end="url(#arr-green)"/>
  <line x1="970" y1="165" x2="860" y2="195" stroke="#22d3ee" stroke-width="1" marker-end="url(#arr-green)"/>

  <rect x="760" y="200" width="200" height="60" rx="6" fill="#0f172a"/><rect x="760" y="200" width="200" height="60" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="2"/>
  <text x="860" y="225" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="700">DevOps Agent Space</text>
  <text x="860" y="245" text-anchor="middle" fill="#94a3b8" font-size="8">Autonomous Investigation</text>

  <!-- Proactive checks list -->
  <rect x="650" y="285" width="510" height="220" rx="6" fill="rgba(30, 41, 59, 0.3)" stroke="#475569" stroke-width="1"/>
  <text x="905" y="308" text-anchor="middle" fill="#f8fafc" font-size="10" font-weight="600">Proactive Patrol Matrix</text>
  
  <text x="670" y="333" fill="#34d399" font-size="9" font-weight="600">Daily Health (08:00)</text>
  <text x="670" y="348" fill="#94a3b8" font-size="8">SLO status, Error Budget, Pod restarts, Pending pods</text>
  
  <text x="670" y="370" fill="#22d3ee" font-size="9" font-weight="600">Weekly Capacity (Mon)</text>
  <text x="670" y="385" fill="#94a3b8" font-size="8">CPU/Mem trend, PV growth, IP pool, cost optimization</text>
  
  <text x="670" y="407" fill="#fbbf24" font-size="9" font-weight="600">Pre-Deploy Gate</text>
  <text x="670" y="422" fill="#94a3b8" font-size="8">Resource request/limit, HPA config, dependency health</text>
  
  <text x="670" y="444" fill="#a78bfa" font-size="9" font-weight="600">Post-Deploy Verify (T+15min)</text>
  <text x="670" y="459" fill="#94a3b8" font-size="8">P99 comparison, error rate delta, auto-rollback decision</text>
  
  <text x="670" y="481" fill="#fb7185" font-size="9" font-weight="600">Security Audit (Daily)</text>
  <text x="670" y="496" fill="#94a3b8" font-size="8">Image CVE, RBAC anomaly, NetworkPolicy coverage</text>

  <!-- Output -->
  <rect x="760" y="530" width="200" height="50" rx="6" fill="#0f172a"/><rect x="760" y="530" width="200" height="50" rx="6" fill="rgba(6, 78, 59, 0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="860" y="552" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">Preemptive Actions</text>
  <text x="860" y="568" text-anchor="middle" fill="#94a3b8" font-size="8">Scale / Alert / Block Deploy / Report</text>

  <line x1="860" y1="260" x2="860" y2="283" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="860" y1="505" x2="860" y2="528" stroke="#34d399" stroke-width="1.5" marker-end="url(#arr-green)"/>
</svg>