<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:700px;margin:24px auto;display:block;background:transparent;">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6e8eff"/>
    </marker>
  </defs>
  <text x="350" y="24" text-anchor="middle" fill="#ededf0" font-size="14" font-family="system-ui" font-weight="600">Othello-GPT 只见过棋谱文本，从没被告知棋盘规则</text>

  <rect x="20" y="50" width="180" height="60" rx="8" fill="#1e1e2a" stroke="#3a3a4a" stroke-width="1.5"/>
  <text x="110" y="75" text-anchor="middle" fill="#ededf0" font-size="12" font-family="system-ui">训练数据</text>
  <text x="110" y="95" text-anchor="middle" fill="#a0a0b0" font-size="11" font-family="system-ui">"D3 D4 F5 F6..."</text>

  <line x1="200" y1="80" x2="255" y2="80" stroke="#6e8eff" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="260" y="50" width="180" height="60" rx="8" fill="#1e1e2a" stroke="#6e8eff" stroke-width="1.5"/>
  <text x="350" y="75" text-anchor="middle" fill="#ededf0" font-size="12" font-family="system-ui">GPT 模型</text>
  <text x="350" y="95" text-anchor="middle" fill="#a0a0b0" font-size="11" font-family="system-ui">只学"预测下一步"</text>

  <line x1="440" y1="80" x2="495" y2="80" stroke="#6e8eff" stroke-width="1.5" marker-end="url(#arrow1)"/>

  <rect x="500" y="50" width="180" height="60" rx="8" fill="#1e1e2a" stroke="#3a3a4a" stroke-width="1.5"/>
  <text x="590" y="75" text-anchor="middle" fill="#ededf0" font-size="12" font-family="system-ui">输出</text>
  <text x="590" y="95" text-anchor="middle" fill="#a0a0b0" font-size="11" font-family="system-ui">下一个合法落子</text>

  <line x1="350" y1="110" x2="350" y2="150" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow1)"/>
  <text x="420" y="135" fill="#a78bfa" font-size="11" font-family="system-ui">研究者打开黑盒探测</text>

  <rect x="200" y="155" width="300" height="80" rx="8" fill="#1e1e2a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="350" y="180" text-anchor="middle" fill="#ededf0" font-size="13" font-family="system-ui" font-weight="600">意外发现：内部激活里</text>
  <text x="350" y="200" text-anchor="middle" fill="#ededf0" font-size="13" font-family="system-ui">编码着完整的棋盘状态</text>
  <text x="350" y="220" text-anchor="middle" fill="#a0a0b0" font-size="11" font-family="system-ui">(64 格「我/你/空」——从未被显式给出)</text>
</svg>
