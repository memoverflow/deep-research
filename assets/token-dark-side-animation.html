<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token 的阴暗面：数字切分与 Glitch Token 可视化</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; margin: 0 auto; }
</style>
</head>
<body>
<script>
p5.disableFriendlyErrors = true;

const PALETTE = {
  bg: '#0a0a0f',
  surface: '#13131a',
  border: '#23232e',
  text: '#ededf0',
  muted: '#6b6b78',
  accent: '#6e8eff',
  danger: '#fb7185',
  warning: '#fbbf24',
  success: '#34d399',
  cyan: '#22d3ee',
  violet: '#a78bfa'
};

// Demo modes
const MODES = ['numbers', 'strawberry', 'glitch'];
const MODE_LABELS = ['数字切分灾难', 'strawberry 谜题', 'Glitch Token'];
let currentMode = 0;

// Number tokenization demo
const NUMBER_EXAMPLES = [
  { text: '42', tokens: ['42'], note: '✓ 单 token，模型理解正确' },
  { text: '127', tokens: ['127'], note: '✓ 单 token，没问题' },
  { text: '1287', tokens: ['12', '87'], note: '⚠ 两个 token！模型丢失数值意义' },
  { text: '31415', tokens: ['31', '415'], note: '⚠ 切成 31|415，不是 3|1|4|1|5' },
  { text: '9.11', tokens: ['9', '.', '11'], note: '→ 模型认为 9.11 > 9.9（因为 11 > 9）' },
  { text: '9.9', tokens: ['9', '.', '9'], note: '→ 模型认为这更小？实际更大！' },
  { text: '1000000', tokens: ['100', '0000'], note: '⚠ 百万被切成 100|0000' }
];

// Strawberry demo
const STRAW_STEPS = [
  { label: '你问：', content: '"strawberry" 里有几个 r？', highlight: -1 },
  { label: '模型看到：', content: '', tokens: ['str', 'aw', 'berry'], highlight: -1 },
  { label: '模型内心：', content: '"str" 里有 r... "aw" 里没有... "berry" 里有 r...', highlight: -1 },
  { label: '模型回答：', content: '2 个 r ❌ （实际是 3 个！）', highlight: -1 },
  { label: '原因：', content: '"r" 被藏在 "str" 这个不透明 token 里', highlight: 0 }
];

// Glitch token demo
const GLITCH_TOKENS = [
  { token: ' SolidGoldMagikarp', effect: '模型陷入循环/拒绝回应', severity: 3 },
  { token: ' attRot', effect: '输出乱码或声称存在恐惧', severity: 3 },
  { token: ' TheNitromeFan', effect: '模型声称自己不是 AI', severity: 2 },
  { token: ' StreamerBot', effect: '产生不连贯的胡言乱语', severity: 2 },
  { token: ' ppolygon', effect: '触发重复输出循环', severity: 1 },
  { token: ' davidjl', effect: '模型拒绝重复该词', severity: 1 }
];

let step = 0;
let maxStep = 0;
let autoPlay = false;
let autoTimer = 0;
let particles = [];
let btnNext, btnAuto, btnReset, btnMode;

function setup() {
  let w = min(windowWidth, 900);
  let h = min(windowHeight, 520);
  createCanvas(w, h);
  textFont('system-ui');
  updateMaxStep();
}

function updateMaxStep() {
  if (currentMode === 0) maxStep = NUMBER_EXAMPLES.length - 1;
  else if (currentMode === 1) maxStep = STRAW_STEPS.length - 1;
  else maxStep = GLITCH_TOKENS.length - 1;
}

function draw() {
  background(PALETTE.bg);
  
  // Title bar
  drawTitleBar();
  
  // Mode tabs
  drawModeTabs();
  
  // Content area
  if (currentMode === 0) drawNumberMode();
  else if (currentMode === 1) drawStrawberryMode();
  else drawGlitchMode();
  
  // Controls
  drawControls();
  
  // Particles
  updateParticles();
  
  // Auto-play
  if (autoPlay && frameCount % 90 === 0) {
    if (step < maxStep) step++;
    else { step = 0; }
  }
}

function drawTitleBar() {
  fill(PALETTE.text);
  noStroke();
  textSize(18);
  textAlign(CENTER, TOP);
  text('Token 的阴暗面：交互式演示', width/2, 15);
  
  textSize(12);
  fill(PALETTE.muted);
  text('点击下方标签切换演示 | 点击"下一步"逐步观察', width/2, 40);
}

function drawModeTabs() {
  let tabW = 160;
  let startX = (width - tabW * 3 - 20) / 2;
  let tabY = 65;
  
  for (let i = 0; i < 3; i++) {
    let x = startX + i * (tabW + 10);
    let isActive = i === currentMode;
    
    // Tab background
    if (isActive) {
      fill(PALETTE.accent + '33');
      stroke(PALETTE.accent);
    } else {
      fill(PALETTE.surface);
      stroke(PALETTE.border);
    }
    strokeWeight(1.5);
    rect(x, tabY, tabW, 32, 8);
    
    // Tab label
    fill(isActive ? PALETTE.accent : PALETTE.muted);
    noStroke();
    textSize(13);
    textAlign(CENTER, CENTER);
    text(MODE_LABELS[i], x + tabW/2, tabY + 16);
  }
}

function drawNumberMode() {
  let startY = 120;
  
  // Show current and previous examples
  for (let i = 0; i <= step; i++) {
    let ex = NUMBER_EXAMPLES[i];
    let y = startY + i * 55;
    let isCurrent = i === step;
    let alpha = isCurrent ? 255 : 150;
    
    // Original number
    fill(isCurrent ? PALETTE.text : PALETTE.muted);
    textSize(isCurrent ? 20 : 16);
    textAlign(LEFT, CENTER);
    text(ex.text, 40, y + 15);
    
    // Arrow
    fill(PALETTE.muted);
    textSize(14);
    text('→', 130, y + 15);
    
    // Tokens
    let tx = 160;
    for (let t = 0; t < ex.tokens.length; t++) {
      let tw = textWidth(ex.tokens[t]) + 20;
      textSize(isCurrent ? 18 : 14);
      tw = textWidth(ex.tokens[t]) + 24;
      
      let tokenColor = ex.tokens.length > 1 ? PALETTE.warning : PALETTE.success;
      if (!isCurrent) tokenColor = PALETTE.muted;
      
      fill(tokenColor + '22');
      stroke(tokenColor);
      strokeWeight(1.5);
      rect(tx, y, tw, 30, 6);
      
      fill(isCurrent ? PALETTE.text : PALETTE.muted);
      noStroke();
      textAlign(CENTER, CENTER);
      text(ex.tokens[t], tx + tw/2, y + 15);
      
      tx += tw + 8;
      
      if (t < ex.tokens.length - 1) {
        fill(PALETTE.danger);
        textSize(12);
        textAlign(CENTER, CENTER);
        text('|', tx - 4, y + 15);
      }
    }
    
    // Note
    if (isCurrent) {
      fill(ex.tokens.length > 1 ? PALETTE.warning : PALETTE.success);
      textSize(12);
      textAlign(LEFT, CENTER);
      text(ex.note, 160, y + 40);
    }
  }
}

function drawStrawberryMode() {
  let startY = 130;
  
  for (let i = 0; i <= step; i++) {
    let s = STRAW_STEPS[i];
    let y = startY + i * 70;
    let isCurrent = i === step;
    
    // Label
    fill(PALETTE.accent);
    textSize(13);
    textAlign(LEFT, TOP);
    text(s.label, 40, y);
    
    if (s.tokens) {
      // Draw token boxes
      let tx = 40;
      textSize(20);
      for (let t = 0; t < s.tokens.length; t++) {
        let tw = textWidth(s.tokens[t]) + 28;
        let highlight = (step === 4 && t === 0);
        
        fill(highlight ? PALETTE.danger + '33' : PALETTE.surface);
        stroke(highlight ? PALETTE.danger : PALETTE.border);
        strokeWeight(highlight ? 2 : 1.5);
        rect(tx, y + 20, tw, 36, 8);
        
        fill(highlight ? PALETTE.danger : PALETTE.text);
        noStroke();
        textAlign(CENTER, CENTER);
        text(s.tokens[t], tx + tw/2, y + 38);
        
        tx += tw + 10;
      }
      
      if (step === 4) {
        fill(PALETTE.danger);
        textSize(11);
        textAlign(LEFT, CENTER);
        text('← 这里藏着一个 r，但模型看不到单个字符！', tx + 10, y + 38);
      }
    } else {
      // Text content
      fill(isCurrent ? PALETTE.text : PALETTE.muted);
      textSize(16);
      textAlign(LEFT, TOP);
      text(s.content, 40, y + 22);
    }
  }
}

function drawGlitchMode() {
  let startY = 120;
  
  // Explanation
  fill(PALETTE.muted);
  textSize(12);
  textAlign(LEFT, TOP);
  text('Glitch Token：词表中存在但模型几乎没见过的"幽灵"token，输入后导致不可预测行为', 40, startY);
  
  for (let i = 0; i <= step; i++) {
    let g = GLITCH_TOKENS[i];
    let y = startY + 30 + i * 65;
    let isCurrent = i === step;
    
    // Token box with glitch effect
    let glitchOffset = isCurrent ? sin(frameCount * 0.1) * 2 : 0;
    
    textSize(16);
    let tw = textWidth(g.token) + 30;
    
    fill(PALETTE.danger + (isCurrent ? '33' : '11'));
    stroke(PALETTE.danger + (isCurrent ? 'ff' : '66'));
    strokeWeight(isCurrent ? 2 : 1);
    rect(40 + glitchOffset, y, tw, 34, 6);
    
    fill(isCurrent ? PALETTE.text : PALETTE.muted);
    noStroke();
    textAlign(LEFT, CENTER);
    text(g.token, 50 + glitchOffset, y + 17);
    
    // Effect
    fill(isCurrent ? PALETTE.warning : PALETTE.muted);
    textSize(13);
    text('→ ' + g.effect, tw + 60, y + 10);
    
    // Severity bar
    if (isCurrent) {
      let barX = tw + 60;
      let barY = y + 28;
      for (let s = 0; s < 3; s++) {
        fill(s < g.severity ? PALETTE.danger : PALETTE.border);
        noStroke();
        rect(barX + s * 18, barY, 14, 6, 3);
      }
      fill(PALETTE.muted);
      textSize(10);
      text('危险度', barX + 60, barY + 3);
    }
    
    // Glitch particles for current
    if (isCurrent && frameCount % 10 === 0) {
      for (let p = 0; p < 3; p++) {
        particles.push({
          x: 40 + random(tw),
          y: y + random(34),
          vx: random(-2, 2),
          vy: random(-3, -1),
          life: 30,
          color: PALETTE.danger
        });
      }
    }
  }
}

function drawControls() {
  let btnY = height - 45;
  let btnW = 80;
  let spacing = 15;
  let startX = (width - btnW * 3 - spacing * 2) / 2;
  
  // Next button
  drawButton(startX, btnY, btnW, 35, '下一步', step < maxStep);
  // Auto button
  drawButton(startX + btnW + spacing, btnY, btnW, 35, autoPlay ? '暂停' : '自动', true);
  // Reset button
  drawButton(startX + (btnW + spacing) * 2, btnY, btnW, 35, '重置', true);
  
  // Step indicator
  fill(PALETTE.muted);
  textSize(11);
  textAlign(CENTER, CENTER);
  text(`${step + 1} / ${maxStep + 1}`, width/2, btnY - 15);
}

function drawButton(x, y, w, h, label, enabled) {
  fill(enabled ? PALETTE.surface : PALETTE.bg);
  stroke(enabled ? PALETTE.accent : PALETTE.border);
  strokeWeight(1.5);
  rect(x, y, w, h, 8);
  
  fill(enabled ? PALETTE.text : PALETTE.muted);
  noStroke();
  textSize(13);
  textAlign(CENTER, CENTER);
  text(label, x + w/2, y + h/2);
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    
    let alpha = map(p.life, 0, 30, 0, 200);
    fill(red(color(p.color)), green(color(p.color)), blue(color(p.color)), alpha);
    noStroke();
    rect(p.x, p.y, random(2, 6), random(1, 3));
    
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function mousePressed() {
  // Check mode tabs
  let tabW = 160;
  let startX = (width - tabW * 3 - 20) / 2;
  let tabY = 65;
  
  for (let i = 0; i < 3; i++) {
    let x = startX + i * (tabW + 10);
    if (mouseX > x && mouseX < x + tabW && mouseY > tabY && mouseY < tabY + 32) {
      currentMode = i;
      step = 0;
      autoPlay = false;
      updateMaxStep();
      return;
    }
  }
  
  // Check control buttons
  let btnY = height - 45;
  let btnW = 80;
  let spacing = 15;
  let startBtnX = (width - btnW * 3 - spacing * 2) / 2;
  
  // Next
  if (mouseX > startBtnX && mouseX < startBtnX + btnW && mouseY > btnY && mouseY < btnY + 35) {
    if (step < maxStep) step++;
    return;
  }
  // Auto
  if (mouseX > startBtnX + btnW + spacing && mouseX < startBtnX + btnW * 2 + spacing && mouseY > btnY && mouseY < btnY + 35) {
    autoPlay = !autoPlay;
    return;
  }
  // Reset
  if (mouseX > startBtnX + (btnW + spacing) * 2 && mouseX < startBtnX + btnW * 3 + spacing * 2 && mouseY > btnY && mouseY < btnY + 35) {
    step = 0;
    autoPlay = false;
    return;
  }
}

function windowResized() {
  resizeCanvas(min(windowWidth, 900), min(windowHeight, 520));
}
</script>
</body>
</html>
