title: Lucas's Blog
description: "AI、技术与思考"
baseurl: ""
url: "https://blog.oscine.io"
markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Collections for research posts
collections:
  research:
    output: true
    permalink: /:collection/:name/

# Default front matter
defaults:
  - scope:
      path: ""
      type: "research"
    values:
      layout: "research"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - research/
