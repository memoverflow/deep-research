---
layout: default
---
<article class="research-post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span class="date">{{ page.date | date: "%Y-%m-%d" }}</span>
      <span class="level">Level {{ page.level }}</span>
      <span class="sources">{{ page.sources_count }} sources</span>
      {% if page.arxiv_count %}<span class="arxiv">{{ page.arxiv_count }} arxiv papers</span>{% endif %}
    </div>
    {% if page.tags %}
    <div class="post-tags">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
