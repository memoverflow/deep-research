<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <p class="site-description">{{ site.description }}</p>
    </div>
  </header>
  <main class="page-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>
  <footer class="site-footer">
    <div class="wrapper">
      <p>&copy; {{ site.time | date: '%Y' }} Deep Research Archive | Powered by <a href="https://github.com/memoverflow/deep-research">GitHub</a></p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    document.querySelectorAll('code.language-mermaid').forEach(function(el) {
      var pre = el.parentElement;
      var div = document.createElement('pre');
      div.className = 'mermaid';
      div.textContent = el.textContent;
      pre.parentNode.replaceChild(div, pre);
    });
    mermaid.initialize({startOnLoad:true, theme:'dark', themeVariables:{primaryColor:'#1e1e2a',primaryTextColor:'#ededf0',primaryBorderColor:'#3a3a4a',lineColor:'#6e8eff',secondaryColor:'#13131a',tertiaryColor:'#0a0a0f'}});
  </script>
</body>
</html>
